<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>No Excuses 💌</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="hearts"></div>

  <div class="app">
    <header>
      <h1>No Excuses 💌</h1>
      <p>Daily kindness missions</p>
    </header>

    <div id="login">
      <input id="username" placeholder="User ID" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="login()">Login</button>
    </div>

    <div id="main" style="display:none">
      <div class="topbar">
        <div class="stat">
          ⭐ Points
          <p id="points">0</p>
        </div>

        <div class="stat">
          🔥 Streak
          <p id="streak">0</p>
        </div>

        <div class="stat">
          🏆 Level
          <p id="level">Beginner</p>
        </div>
      </div>

      <div class="progress">
        <div id="progressBar"></div>
      </div>

      <h2>💌 Compliments</h2>

      <div id="compliments"></div>

      <button class="addBtn" onclick="addCompliment()">Add Compliment</button>

      <div class="cat">
        <div id="catEmoji">😸</div>
        <p id="catText">Waiting for compliments...</p>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>

</html>
